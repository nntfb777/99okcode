<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>99OK - TRUNG TÂM NHẬN THƯỞNG</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="w-full max-w-md relative z-10 px-4">
        <div class="text-center mb-6">
            <img src="logo.png" alt="99OK Logo" class="h-24 mx-auto drop-shadow-md">
        </div>

        <div class="premium-card p-8">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Trung Tâm Quà Tặng</h2>
                <p class="text-gray-500 text-sm font-medium">Nhập thông tin hội viên để nhận quà</p>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="block text-gray-700 text-xs font-bold mb-2 uppercase ml-1">Tên tài khoản hội viên:</label>
                    <div class="input-group flex items-center rounded-2xl px-4 py-1">
                        <i class="fa-solid fa-circle-user text-xl blue-icon"></i>
                        <input type="text" id="username" placeholder="Nhập tên đăng nhập" class="w-full bg-transparent border-none py-4 px-3 focus:outline-none font-semibold text-gray-700">
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 text-xs font-bold mb-2 uppercase ml-1">Mã Code ưu đãi:</label>
                    <div class="input-group flex items-center rounded-2xl px-4 py-1 border-yellow-200">
                        <i class="fa-solid fa-ticket-simple text-xl gold-icon"></i>
                        <input type="text" id="rewardCode" placeholder="NHẬP MÃ TẠI ĐÂY" class="w-full bg-transparent border-none py-4 px-3 focus:outline-none font-black text-blue-500 tracking-widest uppercase">
                    </div>
                </div>

                <button onclick="handleClaim()" id="btnSubmit" class="w-full btn-gold py-5 rounded-2xl text-xl flex items-center justify-center gap-3 mt-4">
                    <i class="fa-solid fa-gift"></i> NHẬN QUÀ
                </button>
            </div>

            <div id="statusBox" class="mt-6 hidden p-4 rounded-2xl text-center font-bold border-2"></div>
        </div>

        <div class="text-center mt-8 text-white/70 text-[10px] font-bold uppercase tracking-[0.2em]">
            Bản quyền thuộc 99OK &copy; 2026
        </div>
    </div>

    <div id="captcha-popup">
        <div class="popup-content">
            <h3 class="text-gray-800 font-bold mb-4 uppercase text-sm tracking-widest">Xác minh danh tính</h3>
            <div id="captcha-container"></div>
            <button onclick="closeCaptcha()" class="mt-4 text-xs text-gray-400 underline uppercase">Hủy bỏ</button>
        </div>
    </div>

    <div id="result-popup" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/60 backdrop-blur-sm p-4">
    <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl transform transition-all scale-100 p-6 text-center">
        <div id="result-icon" class="mb-4">
            </div>
        <h3 id="result-title" class="text-2xl font-black text-gray-800 uppercase mb-2"></h3>
        <div id="result-content" class="text-gray-600 mb-6 space-y-2 text-left bg-gray-50 p-4 rounded-2xl border border-dashed border-gray-200">
            </div>
        <button onclick="closeResultPopup()" class="w-full py-4 bg-blue-500 hover:bg-blue-600 text-white font-bold rounded-2xl transition-all uppercase tracking-widest shadow-lg">
            Xác nhận
        </button>
    </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
